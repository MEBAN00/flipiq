<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0F0F11" />
  <meta name="description" content="FlipIQ — Master concepts with smart flashcards. Works offline." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FlipIQ" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <title>FlipIQ — Smart Flashcards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ═══════════════════════════════ HOME SCREEN ═══════════════════════════ -->
  <div id="screen-home" class="screen active">
    <div class="home-bg-pattern"></div>

    <header class="home-header">
      <div class="logo-wrap">
        <span class="logo-mark">F</span>
        <span class="logo-text">FlipIQ</span>
      </div>
      <p class="tagline">Study smarter, not harder</p>
    </header>

    <div id="install-banner" class="install-banner hidden">
      <div class="install-text">
        <span class="install-icon">📲</span>
        <span>Install FlipIQ for offline use</span>
      </div>
      <button id="install-btn" class="install-btn">Install</button>
    </div>

    <div id="offline-badge" class="offline-badge hidden">
      <span class="offline-dot"></span> Offline Mode
    </div>

    <section class="decks-section">
      <div class="section-label">CHOOSE A DECK</div>
      <div id="deck-list" class="deck-list"></div>
    </section>

    <footer class="home-footer">
      <span>⚡ Offline Ready</span>
      <span class="footer-dot">·</span>
      <span>💾 Progress Saved</span>
      <span class="footer-dot">·</span>
      <span>📱 Installable</span>
    </footer>
  </div>

  <!-- ══════════════════════════════ STUDY SCREEN ═══════════════════════════ -->
  <div id="screen-study" class="screen">

    <div class="study-header">
      <button id="back-btn" class="back-btn" aria-label="Back to decks">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M12.5 15L7.5 10L12.5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Decks
      </button>
      <div class="study-deck-title" id="study-deck-title"></div>
      <div class="progress-text" id="progress-text">1 / 10</div>
    </div>

    <div class="progress-track">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div class="card-stage">
      <div class="card" id="flashcard" role="button" tabindex="0" aria-label="Flashcard, tap to flip">
        <div class="card-inner">
          <div class="card-face card-front">
            <div class="card-face-label">QUESTION</div>
            <div class="card-text" id="card-question"></div>
            <div class="tap-hint">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M7 16V4m0 0L3 8m4-4l4 4"/>
                <path d="M17 8v12m0 0l4-4m-4 4l-4-4"/>
              </svg>
              tap to reveal
            </div>
          </div>
          <div class="card-face card-back">
            <div class="card-face-label">ANSWER</div>
            <div class="card-text" id="card-answer"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="action-buttons hidden" id="action-buttons">
      <button class="btn-action btn-wrong" id="btn-wrong">
        <span class="btn-icon">✗</span>
        <span>Missed it</span>
      </button>
      <button class="btn-action btn-right" id="btn-right">
        <span class="btn-icon">✓</span>
        <span>Got it</span>
      </button>
    </div>

    <div class="score-track">
      <span class="score-pill score-correct" id="score-correct">0 correct</span>
      <span class="score-pill score-wrong" id="score-wrong">0 wrong</span>
    </div>

  </div>

  <!-- ═════════════════════════════ RESULTS SCREEN ══════════════════════════ -->
  <div id="screen-results" class="screen">
    <div class="results-inner">

      <div class="results-top">
        <div class="results-emoji" id="results-icon">🏆</div>
        <h1 class="results-heading">Session Complete</h1>
        <div class="results-deck-name" id="results-deck-name"></div>
      </div>

      <div class="score-ring-wrap">
        <svg class="score-ring" viewBox="0 0 120 120">
          <circle class="ring-bg" cx="60" cy="60" r="50" />
          <circle class="ring-fill" id="ring-fill" cx="60" cy="60" r="50"
            stroke-dasharray="314"
            stroke-dashoffset="314" />
        </svg>
        <div class="score-ring-text">
          <div class="score-pct" id="results-score">0%</div>
          <div class="score-ring-label">score</div>
        </div>
      </div>

      <div class="results-stats">
        <div class="stat-box">
          <div class="stat-num stat-correct-num" id="stat-correct">0</div>
          <div class="stat-lbl">Correct</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-box">
          <div class="stat-num stat-wrong-num" id="stat-wrong">0</div>
          <div class="stat-lbl">Wrong</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-box">
          <div class="stat-num" id="stat-total">0</div>
          <div class="stat-lbl">Total</div>
        </div>
      </div>

      <div class="best-score-note" id="best-score-note"></div>

      <div class="results-actions">
        <button class="btn-retry" id="btn-retry">Study Again</button>
        <button class="btn-home" id="btn-home">All Decks</button>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
